<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلوا حبابنا | تسجيل الدخول</title>
    <!-- استيراد الخطوط والأيقونات -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #c3922e; /* لون الذهب الأساسي للهوية */
            --bg: #0a0a0a;
            --card-bg: #151515;
            --text: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'IBM Plex Sans Arabic', sans-serif; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
        }

        /* تصميم بطاقة تسجيل الدخول بشكل زجاجي وأنيق */
        .login-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(195, 146, 46, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
        }

        .logo { width: 80px; margin-bottom: 20px; }
        h1 { font-size: 1.5rem; margin-bottom: 30px; color: var(--gold); }
        .form-group { margin-bottom: 20px; text-align: right; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #888; }
        
        /* تنسيق خانات الإدخال مع الأيقونات الجانبية */
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--gold); }
        
        input {
            width: 100%;
            padding: 12px 45px 12px 15px;
            background: #222;
            border: 1px solid #333;
            border-radius: 10px;
            color: white;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(195, 146, 46, 0.1); }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--gold);
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .login-btn:hover { background: #d4a345; transform: translateY(-2px); }
        .error-msg { color: #ff4d4d; font-size: 0.85rem; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="images/tallo-logo.png" alt="Logo" class="logo">
    <h1>تسجيل دخول الإدارة</h1>
    
    <!-- نموذج إدخال البيانات -->
    <div class="form-group">
        <label>اسم المستخدم</label>
        <div class="input-wrapper">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="username" placeholder="اسم المستخدم الخاص بك" autocomplete="username">
        </div>
    </div>

    <div class="form-group">
        <label>كلمة المرور</label>
        <div class="input-wrapper">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" placeholder="••••••" autocomplete="current-password">
        </div>
    </div>

    <button class="login-btn" onclick="handleLogin()">دخول النظام</button>
    <p class="error-msg" id="error">خطأ في اسم المستخدم أو كلمة المرور!</p>
</div>

<!-- مكتبات Firebase الأساسية -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
    // إعدادات الاتصال بقاعدة البيانات
    const firebaseConfig = {
        apiKey: "AIzaSyCwMxgmrfnsme4pgLx00tgjGCo-gQBMUo8",
        authDomain: "tallow-ahbabna.firebaseapp.com",
        projectId: "tallow-ahbabna",
        storageBucket: "tallow-ahbabna.firebasestorage.app",
        messagingSenderId: "1025966646494",
        appId: "1:1025966646494:web:f89373fad63d988f298e4f",
        databaseURL: "https://tallow-ahbabna-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // وظيفة معالجة عملية تسجيل الدخول
    function handleLogin() {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        const err = document.getElementById('error');
        const btn = document.querySelector('.login-btn');

        if(!u || !p) return;
        
        btn.disabled = true;
        btn.textContent = 'جاري التحقق...';

        // 1. فحص حساب "المدير العام" الافتراضي (للطوارئ)
        if(u === '120120' && p === '120120') {
            doAuth(u);
            return;
        }

        // 2. فحص الحسابات المسجلة في Firebase
        db.ref('users').once('value').then(snapshot => {
            const users = snapshot.val();
            let found = false;
            
            if (users) {
                // البحث في القائمة عن تطابق للاسم وكلمة المرور
                Object.keys(users).forEach(key => {
                    const user = users[key];
                    if (user.username === u && user.password === p) {
                        found = true;
                    }
                });
            }

            if (found) {
                doAuth(u); // نجاح الدخول
            } else {
                showError(); // فشل الدخول
            }
        }).catch(() => {
            showError();
        });

        // وظيفة تفعيل "جلسة الدخول" وحفظها في المتصفح
        function doAuth(user) {
            localStorage.setItem('admin_auth', 'true');
            localStorage.setItem('admin_user', user);
            localStorage.setItem('auth_time', Date.now());
            window.location.href = 'admin.html'; // الانتقال للوحة التحكم
        }

        function showError() {
            err.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'دخول النظام';
            setTimeout(() => { err.style.display = 'none'; }, 3000);
        }
    }

    // التحقق التلقائي: إذا كان المدير مسجلاً دخوله مسبقاً، يتم تحويله للوحة الإدارة فوراً
    if(localStorage.getItem('admin_auth') === 'true') {
        window.location.href = 'admin.html';
    }
</script>

</body>
</html>

</body>
</html>
