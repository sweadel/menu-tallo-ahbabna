<!DOCTYPE html>
<!-- 
  ==========================================================================
  PROJECT: Tallo Ahbabna - Digital Menu & Landing Page
  FILE: index.html
  DESCRIPTION: The main gateway for customers. Features a video background,
               restaurant logo, and quick access buttons to the menu and feedback.
  VERSION: 3.0 (Cleaned & Documented)
  ==========================================================================
-->
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#C5A022">
    <meta name="description" content="مطعم طلوا حبابنا - مادبا، الأردن. اكتشف قائمة طعامنا الكاملة وجرب أصنافنا المميزة.">

    <!-- Social Media Meta Tags (Open Graph) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="طلوا حبابنا | مادبا">
    <meta property="og:description" content="تفضل وشوف قائمتنا الكاملة - تجربة طعام فريدة في قلب مادبا">
    <meta property="og:image" content="images/tallo-logo.png">
    <meta property="og:locale" content="ar_SA">

    <!-- Progressive Web App (PWA) Support -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="images/tallo-logo.png">

    <title>طلوا حبابنا | مادبا</title>

    <!-- Typography: IBM Plex Sans Arabic (Premium & Modern) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap">

    <style>
        /* 
        --------------------------------------------------------------------------
        DESIGN SYSTEM & TOKENS
        --------------------------------------------------------------------------
        */
        :root {
            --gold: #E5C467;        /* Light Elegant Gold */
            --gold-dark: #C5A022;   /* Deep Gold for Interactive States */
            --dark: #080808;        /* True Black Background */
            --glass: rgba(8, 8, 8, .75); /* Dark Glassmorphism Effect */
            --overlay-op: .52;      /* Default Video Overlay Opacity */
        }

        /* Global Reset */
        *, *::before, *::after, input, button {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'IBM Plex Sans Arabic', sans-serif !important;
            font-weight: 600;
        }

        html, body {
            height: 100%;
            overflow: hidden; /* Prevent scrolling on the landing page */
        }

        body {
            background: var(--dark);
            direction: rtl;
            position: relative;
        }

        /* 
        --------------------------------------------------------------------------
        VIDEO BACKGROUND
        --------------------------------------------------------------------------
        */
        .vid-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .vid-bg video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        /* Dark overlay over video to ensure text readability */
        .vid-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, var(--overlay-op));
            transition: background 0.3s ease;
        }

        /* 
        --------------------------------------------------------------------------
        LOGO SECTION
        --------------------------------------------------------------------------
        */
        .logo-wrap {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            justify-content: center;
            padding-top: 7vh;
            pointer-events: none;
        }

        .logo-wrap img {
            height: 300px;
            width: auto;
            filter: drop-shadow(0 4px 30px rgba(0, 0, 0, .9));
            transition: height 0.4s ease;
        }

        /* 
        --------------------------------------------------------------------------
        INTERACTIVE PANEL (Buttons & Social)
        --------------------------------------------------------------------------
        */
        .panel {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 10;
            background: linear-gradient(transparent, var(--glass) 18%, rgba(6, 6, 6, .75));
            padding: 14px 20px 0;
            border-radius: 24px 24px 0 0;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* Button Column */
        .btn-col {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 10px;
        }

        /* Base Button Styles */
        .main-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px 20px;
            border-radius: 14px;
            font-size: 1.1rem;
            text-decoration: none;
            transition: all .22s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            cursor: pointer;
            gap: 10px;
            letter-spacing: .02em;
        }

        /* Gold Variant: Primary Action */
        .main-btn.gold {
            background: linear-gradient(135deg, #C5A022, #a8841c);
            color: #000;
            box-shadow: 0 4px 18px rgba(197, 160, 34, .45);
        }

        .main-btn.gold:hover, .main-btn.gold:active {
            background: var(--gold-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 22px rgba(197, 160, 34, .6);
        }

        /* Ghost Variant: Secondary Action */
        .main-btn.ghost {
            background: rgba(255, 255, 255, .1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, .18);
        }

        .main-btn.ghost:hover, .main-btn.ghost:active {
            background: rgba(255, 255, 255, .18);
            transform: translateY(-1px);
        }

        /* Footer Tagline */
        .tagline {
            text-align: center;
            color: rgba(255, 255, 255, .4);
            font-size: .78rem;
            padding: 6px 0 0;
            letter-spacing: .4px;
        }

        /* Social Media Bar (Floating Premium) */
        .social-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 400px;
            background: rgba(15, 15, 15, 0.7);
            padding: 12px 10px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .s-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: .65rem;
            font-weight: 700;
            gap: 4px;
            transition: all .2s;
            flex: 1;
        }

        .s-link i {
            font-size: 1.1rem;
            color: var(--gold);
            margin-bottom: 2px;
        }

        .s-link:hover, .s-link:active {
            color: #fff;
            transform: translateY(-2px);
        }

        /* Mobile Optimization */
        @media (max-width: 380px) {
            .logo-wrap img { height: 160px; }
            .main-btn { font-size: .92rem; padding: 13px 16px; }
        }
    </style>
</head>

<body>

    <!-- Background Video Layer -->
    <div class="vid-bg">
        <video autoplay muted loop playsinline preload="auto" poster="images/drinks-bg.png">
            <source id="home-video-source" src="images/tallo-video.mp4" type="video/mp4">
        </video>
    </div>

    <!-- Central Logo Layer -->
    <div class="logo-wrap">
        <img id="main-logo" src="images/tallo-logo.png" alt="طلوا حبابنا - مادبا" loading="eager">
    </div>

    <!-- Control Panel -->
    <div class="panel">
        <div class="btn-col">
            <!-- Navigation Buttons -->
            <a href="menu.html#arabic" id="btn_arabic" class="main-btn gold">
                قائمة الطعام - عربي
            </a>

            <a href="menu-en.html" id="btn_english" class="main-btn gold">
                Tallo Menu - English
            </a>

            <a href="feedback.html" id="btn_feedback_ar" class="main-btn ghost">
                شاركنا تجربتك
            </a>

            <a href="feedback-en.html" id="btn_feedback_en" class="main-btn ghost">
                Share Your Experience
            </a>
        </div>

        <p class="tagline">طلوا حبابنا - مادبا، الأردن</p>

        <!-- Social Bar Links -->
        <div class="social-bar">
            <a href="https://maps.app.goo.gl/e8zRvaiQsCE6bMM4A" id="link_maps" target="_blank" rel="noopener" class="s-link">
                <i class="fa-solid fa-location-dot"></i>
                <span>الموقع</span>
            </a>

            <a href="https://wa.me/962779688633" id="link_whatsapp" target="_blank" rel="noopener" class="s-link">
                <i class="fa-brands fa-whatsapp"></i>
                <span>واتساب</span>
            </a>

            <a href="https://www.instagram.com/tallo.hbabna/" id="link_instagram" target="_blank" rel="noopener" class="s-link">
                <i class="fa-brands fa-instagram"></i>
                <span>إنستغرام</span>
            </a>

            <a href="https://www.facebook.com/people/tallo-hbabna/61586065659210/" id="link_facebook" target="_blank" rel="noopener" class="s-link">
                <i class="fa-brands fa-facebook-f"></i>
                <span>فيسبوك</span>
            </a>
        </div>
    </div>

    <!-- Firebase Integration for Real-time Content & Design Sync -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="js/design-sync.js"></script>

    <script>
        /**
         * Home Page Real-time Settings Listener
         * Fetches data from Firebase Database under 'settings/home'
         */
        function initHomeSync() {
            if (typeof firebase === 'undefined') {
                setTimeout(initHomeSync, 500);
                return;
            }

            const homeRef = firebase.database().ref('settings/home');
            homeRef.on('value', snap => {
                const d = snap.val();
                if (!d) return;

                // 1. Update Video Background
                const video = document.querySelector('.vid-bg video');
                const source = document.getElementById('home-video-source');
                if (d.homeVideo && source.src !== d.homeVideo) {
                    source.src = d.homeVideo;
                    video.load();
                }

                // 2. Update Video Overlay Opacity
                if (d.homeOverlay !== undefined) {
                    document.documentElement.style.setProperty('--overlay-op', d.homeOverlay);
                }

                // 3. Update Logo Size
                if (d.homeLogoSize) {
                    const logo = document.getElementById('main-logo');
                    if(logo) logo.style.height = d.homeLogoSize + 'px';
                }

                // 4. Update Tagline Text
                if (d.homeTagline) {
                    document.querySelector('.tagline').textContent = d.homeTagline;
                }

                // 5. Toggle Buttons Visibility
                const toggle = (id, show) => {
                    const el = document.getElementById(id);
                    if (el) el.style.display = show ? 'flex' : 'none';
                };
                
                toggle('btn_arabic', d.showBtnAr);
                toggle('btn_english', d.showBtnEn);
                toggle('btn_feedback_ar', d.showBtnFeed);
                toggle('btn_feedback_en', d.showBtnFeed);

                // 6. Update Social Links
                const setLink = (id, url, prefix = '') => {
                    const el = document.getElementById(id);
                    if (el) {
                        if (url) { 
                            el.href = prefix + url; 
                            el.style.display = 'flex'; 
                        } else { 
                            el.style.display = 'none'; 
                        }
                    }
                };
                setLink('link_whatsapp', d.whatsapp, 'https://wa.me/');
                setLink('link_instagram', d.instagram);
                setLink('link_facebook', d.facebook);
                setLink('link_maps', d.maps);
            });
        }

        initHomeSync();

        /**
         * 7. Auto Play Intro Audio (Plays Once per Session)
         * Respects browser autoplay policies with interaction fallback.
         */
        function playIntroAudio() {
            if (sessionStorage.getItem('introPlayed')) return;
            
            const audio = new Audio('intro-audio.m4a');
            audio.volume = 0.6;
            
            const startPlay = () => {
                audio.play().then(() => {
                    sessionStorage.setItem('introPlayed', 'true');
                    // Remove listeners once played
                    document.removeEventListener('click', startPlay);
                    document.removeEventListener('touchstart', startPlay);
                }).catch(err => {
                    console.warn("Autoplay blocked by browser. Waiting for user interaction...");
                });
            };

            // Attempt autoplay immediately
            startPlay();
            
            // Fallback: Play on first click or touch
            document.addEventListener('click', startPlay);
            document.addEventListener('touchstart', startPlay);
        }
        playIntroAudio();

        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log("SW Register Error:", err));
        }
    </script>
</body>

</html>
