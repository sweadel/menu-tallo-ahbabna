               restaurant logo, and quick access buttons to the menu and feedback.
  VERSION: 3.0 (Cleaned & Documented)
  ==========================================================================
-->
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#C5A022">
    <meta name="description" content="مطعم طلوا حبابنا - مادبا، الأردن. اكتشف قائمة طعامنا الكاملة وجرب أصنافنا المميزة.">

    <!-- Social Media Meta Tags (Open Graph) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="طلوا حبابنا | مادبا">
    <meta property="og:description" content="تفضل وشوف قائمتنا الكاملة - تجربة طعام فريدة في قلب مادبا">
    <meta property="og:image" content="images/tallo-logo.png">

    <!-- Progressive Web App (PWA) Support -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="images/tallo-logo.png">

    <title>طلوا حبابنا | مادبا</title>

    <!-- Typography: IBM Plex Sans Arabic (Premium & Modern) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap">

    <style>
        :root {
            --gold: #C5A022;
            --gold-glow: rgba(197, 160, 34, 0.4);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #FFFFFF;
            --font-arabic: 'IBM Plex Sans Arabic', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: #000;
            color: var(--text-main);
            font-family: var(--font-arabic);
            overflow: hidden;
            height: 100dvh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            direction: rtl;
        }

        /* Video Background with Radial Shadow */
        .vid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: #000;
        }
        .vid-bg video {
            width: 100%; height: 100%; object-fit: cover;
            opacity: 0.65;
        }
        .vid-bg::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.85) 100%);
            z-index: -1;
        }

        /* Layout Container */
        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Premium Logo Animation */
        .logo-wrap {
            margin-bottom: 45px;
            transition: all 0.5s ease;
        }
        .logo-wrap img {
            width: 240px;
            filter: drop-shadow(0 15px 45px rgba(0,0,0,0.9));
            animation: logoEntrance 1.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* Button Grid */
        .btn-col {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .main-btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 24px;
            border-radius: 100px;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: #fff;
            animation: btnSlideIn 0.8s backwards;
        }

        /* Gold Style */
        .main-btn.gold {
            background: rgba(197, 160, 34, 0.18);
            color: var(--gold);
            border-color: rgba(197, 160, 34, 0.35);
            font-weight: 700;
        }
        .main-btn.gold:active {
            transform: scale(0.96);
            background: var(--gold);
            color: #000;
        }

        /* Ghost Style */
        .main-btn.ghost {
            background: var(--glass);
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.95rem;
        }
        .main-btn.ghost:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.2);
        }

        /* Info Text */
        .tagline {
            margin-top: 35px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.45);
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 400;
        }

        /* Social Bar */
        .social-bar {
            margin-top: 25px;
            display: flex;
            gap: 25px;
            justify-content: center;
        }
        .s-link {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.5rem;
            transition: all 0.3s;
        }
        .s-link:active {
            color: var(--gold);
            transform: scale(1.2);
        }

        /* Animations */
        @keyframes logoEntrance {
            0% { opacity: 0; transform: scale(0.85) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes btnSlideIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Staggered Button Entrance */
        .btn-col a:nth-child(1) { animation-delay: 0.4s; }
        .btn-col a:nth-child(2) { animation-delay: 0.5s; }
        .btn-col a:nth-child(3) { animation-delay: 0.6s; }
        .btn-col a:nth-child(4) { animation-delay: 0.7s; }

        /* Mobile specific tweaks */
        @media (max-height: 700px) {
            .logo-wrap img { width: 190px; }
            .logo-wrap { margin-bottom: 25px; }
            .main-btn { padding: 12px 20px; font-size: 1rem; }
            .tagline { margin-top: 20px; }
        }
    </style>
</head>

<body>

    <!-- Background Video Layer -->
    <div class="vid-bg">
        <video id="bgVideo" autoplay muted loop playsinline preload="metadata" poster="images/wide-bg.png">
            <source id="home-video-source" src="images/tallo-video-final.mp4" type="video/mp4">
        </video>
    </div>

    <!-- Central Content Container -->
    <div class="container">
        <!-- Logo Section -->
        <div class="logo-wrap">
            <img id="main-logo" src="images/tallo-logo.png" alt="طلوا حبابنا - مادبا" loading="eager">
        </div>

        <!-- Interactive Buttons Section -->
        <div class="btn-col">
            <a href="menu.html#arabic" id="btn_arabic" class="main-btn gold">
                قائمة الطعام - عربي
            </a>
            <a href="menu-en.html" id="btn_english" class="main-btn gold">
                Tallo Menu - English
            </a>
            <a href="feedback.html" id="btn_feedback_ar" class="main-btn ghost">
                شاركنا تجربتك
            </a>
            <a href="feedback-en.html" id="btn_feedback_en" class="main-btn ghost">
                Share Your Experience
            </a>
        </div>

        <!-- Social Bar & Location -->
        <p class="tagline">طلوا حبابنا - مادبا، الأردن</p>
        <div class="social-bar">
            <a href="https://maps.app.goo.gl/e8zRvaiQsCE6bMM4A" id="link_maps" target="_blank" rel="noopener" class="s-link" title="الموقع">
                <i class="fa-solid fa-location-dot"></i>
            </a>
            <a href="https://wa.me/962779688633" id="link_whatsapp" target="_blank" rel="noopener" class="s-link" title="واتساب">
                <i class="fa-brands fa-whatsapp"></i>
            </a>
            <a href="https://www.instagram.com/tallo.hbabna/" id="link_instagram" target="_blank" rel="noopener" class="s-link" title="إنستغرام">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="https://www.facebook.com/people/tallo-hbabna/61586065659210/" id="link_facebook" target="_blank" rel="noopener" class="s-link" title="فيسبوك">
                <i class="fa-brands fa-facebook-f"></i>
            </a>
        </div>
    </div>

    <!-- Hidden Audio for Autoplay -->
    <audio id="introAudio" preload="auto" autoplay>
        <source src="intro-audio.m4a" type="audio/mp4">
    </audio>

    <!-- Firebase & Logic -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        /**
         * 1. Extreme Autoplay Logic (Web Audio API + Retry Loop)
         */
        const audioFile = 'intro-audio.m4a';
        let audioContext;
        let audioBuffer;

        async function initExtremeAutoplay() {
            const audio = document.getElementById('introAudio');
            if (!audio) return;

            // محاولة التشغيل المباشر أولاً
            const attempt = () => {
                audio.play().then(() => {
                    console.log("Success: Pure Autoplay!");
                }).catch(() => {
                    console.log("Blocked: Retrying or waiting for interaction...");
                    
                    // خطة الطوارئ: التشغيل مع أول حركة (حتى لو لم تكن نقرة)
                    const unlock = () => {
                        audio.play();
                        window.removeEventListener('touchstart', unlock);
                        window.removeEventListener('pointerdown', unlock);
                        window.removeEventListener('scroll', unlock);
                    };
                    window.addEventListener('touchstart', unlock);
                    window.addEventListener('pointerdown', unlock);
                    window.addEventListener('scroll', unlock);
                });
            };

            // محاولة التشغيل فوراً وبشكل متكرر في الثواني الأولى
            attempt();
            setTimeout(attempt, 1000);
            setTimeout(attempt, 2000);
        }

        // انطلاق المحاولة فور تحميل الصفحة
        window.addEventListener('DOMContentLoaded', initExtremeAutoplay);

        /**
         * 2. Background Video Logic
         */
        function initVideo() {
            const video = document.getElementById('bgVideo');
            if (!video) return;
            video.muted = true;
            video.play().catch(() => {
                window.addEventListener('pointerdown', () => video.play(), {once: true});
            });
        }
        window.addEventListener('load', initVideo);
    </script>
</body>

</html>
