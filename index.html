<!DOCTYPE html>
<!-- 
  ==========================================================================
  المشروع: مطعم طلوا حبابنا - منيو ديجيتال وصفحة هبوط
  الملف: index.html
  الوصف: هذه هي الصفحة الرئيسية (بوابة الموقع) التي تحتوي على فيديو الخلفية،
         شعار المطعم، وأزرار الدخول للمنيو.
  ==========================================================================
-->
<html lang="ar" dir="rtl">

<head>
    <!-- تعريف ترميز الحروف لدعم اللغة العربية -->
    <meta charset="UTF-8">
    <!-- جعل الموقع متوافقاً مع شاشات الهواتف الذكية -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- لون شريط العنوان في المتصفح -->
    <meta name="theme-color" content="#C5A022">
    <!-- وصف الموقع لمحركات البحث (SEO) -->
    <meta name="description" content="مطعم طلوا حبابنا - مادبا، الأردن. اكتشف قائمة طعامنا الكاملة وجرب أصنافنا المميزة.">

    <!-- إعدادات الروابط عند مشاركة الموقع على فيسبوك وواتساب (Open Graph) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="طلوا حبابنا | مادبا">
    <meta property="og:description" content="تفضل وشوف قائمتنا الكاملة - تجربة طعام فريدة في قلب مادبا">
    <meta property="og:image" content="images/tallo-logo.png">
    <meta property="og:locale" content="ar_SA">

    <!-- دعم تحويل الموقع إلى تطبيق (PWA) -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="images/tallo-logo.png">

    <title>طلوا حبابنا | مادبا</title>

    <!-- تحميل الخطوط من جوجل (خط IBM Plex Sans Arabic) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* تعريف المتغيرات (الألوان والخطوط) لتسهيل التغيير لاحقاً */
        :root {
            --gold: #C5A022; /* اللون الذهبي الأساسي */
            --gold-glow: rgba(197, 160, 34, 0.4); /* توهج ذهبي شفاف */
            --glass: rgba(255, 255, 255, 0.05); /* تأثير الزجاج الشفاف */
            --glass-border: rgba(255, 255, 255, 0.12); /* حدود الزجاج */
            --text-main: #FFFFFF; /* لون النص الأبيض */
            --font-arabic: 'IBM Plex Sans Arabic', sans-serif;
        }

        /* تصفير الإعدادات الافتراضية للمتصفح لضمان تناسق التصميم */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: #000; /* خلفية سوداء */
            color: var(--text-main);
            font-family: var(--font-arabic);
            overflow: hidden; /* منع التمرير في الصفحة الرئيسية */
            height: 100dvh; /* طول الصفحة حسب ارتفاع الشاشة */
            width: 100vw;
            display: flex;
            align-items: center; /* توسيط المحتوى عمودياً */
            justify-content: center; /* توسيط المحتوى أفقياً */
            text-align: center;
            direction: rtl; /* الكتابة من اليمين لليسام */
        }

        /* بوابة الدخول الفخمة (Splash Screen) */
        #splash-entry {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 1.2s cubic-bezier(0.7, 0, 0.3, 1);
        }

        #splash-entry.fade-out {
            opacity: 0;
            visibility: hidden;
            transform: scale(1.1);
        }

        .splash-logo {
            width: 280px;
            margin-bottom: 50px;
            filter: drop-shadow(0 0 20px var(--gold-glow));
            animation: logoPulse 3s infinite ease-in-out;
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 40px var(--gold-glow)); }
        }

        .enter-btn {
            background: rgba(197, 160, 34, 0.15);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 18px 60px;
            font-size: 1.4rem;
            font-weight: 700;
            border-radius: 100px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            transition: all 0.4s;
            box-shadow: 0 0 20px rgba(197, 160, 34, 0.2);
        }

        .enter-btn::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: rotate(45deg);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-150%) rotate(45deg); }
            100% { transform: translateX(150%) rotate(45deg); }
        }

        .enter-btn:active {
            transform: scale(0.95);
            background: var(--gold);
            color: #000;
        }

        /* إعدادات فيديو الخلفية */
        .vid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; /* وضعه خلف كل العناصر */
            background: #000;
        }
        .vid-bg video {
            width: 100%; height: 100%; object-fit: cover; /* تغطية كامل الشاشة دون تشويه */
            opacity: 0.65; /* تقليل السطوع لبروز النص */
        }
        /* طبقة تظليل فوق الفيديو لتحسين الرؤية */
        .vid-bg::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.85) 100%);
            z-index: -1;
        }

        /* الحاوية الرئيسية للمحتوى */
        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translateY(30px);
            transition: all 1s ease 0.5s;
        }

        .container.reveal {
            opacity: 1;
            transform: translateY(0);
        }

        /* تأثيرات الشعار (اللوجو) */
        .logo-wrap {
            margin-bottom: 45px;
        }
        .logo-wrap img {
            width: 240px;
            filter: drop-shadow(0 15px 45px rgba(0,0,0,0.9)); /* ظل تحت اللوجو للفخامة */
        }

        /* تنسيق عمود الأزرار */
        .btn-col {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px; /* المسافة بين الأزرار */
        }

        /* التصميم المشترك لجميع الأزرار (Glassmorphism) */
        .main-btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 22px 35px;
            border-radius: 100px;
            text-decoration: none;
            font-size: 1.35rem;
            font-weight: 700;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: #fff;
        }

        /* تنسيق الزر الذهبي */
        .main-btn.gold {
            background: rgba(197, 160, 34, 0.18);
            color: var(--gold);
            border-color: rgba(197, 160, 34, 0.35);
        }
        .main-btn.gold:active {
            transform: scale(0.96); /* تصغير الزر قليلاً عند اللمس */
            background: var(--gold);
            color: #000;
        }

        /* تنسيق الزر الشفاف */
        .main-btn.ghost {
            background: var(--glass);
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.95rem;
        }

        /* شريط الروابط الاجتماعية */
        .social-bar {
            margin-top: 25px;
            display: flex;
            gap: 25px;
            justify-content: center;
            opacity: 0;
            transition: all 1s ease 0.8s;
        }
        .social-bar.reveal { opacity: 1; }

        .s-link {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.5rem;
            transition: all 0.3s;
        }
        .s-link:active {
            color: var(--gold);
            transform: scale(1.2); /* تكبير الأيقونة عند اللمس */
        }

        /* تعديلات خاصة للشاشات الصغيرة جداً */
        @media (max-height: 700px) {
            .logo-wrap img { width: 190px; }
            .logo-wrap { margin-bottom: 25px; }
            .main-btn { padding: 12px 20px; font-size: 1rem; }
        }
    </style>
</head>

<body>

    <!-- بوابة الدخول الفخمة -->
    <div id="splash-entry">
        <img src="images/tallo-logo.png" alt="Logo" class="splash-logo">
        <button class="enter-btn" onclick="startExperience()">اكتشف التجربة</button>
    </div>

    <!-- قسم فيديو الخلفية -->
    <div class="vid-bg">
        <video id="bgVideo" muted loop playsinline preload="auto">
            <source id="home-video-source" src="images/tallo-video-final.mp4" type="video/mp4">
        </video>
    </div>

    <!-- الحاوية المركزية للمحتوى -->
    <div class="container" id="main-container">
        <!-- قسم الشعار -->
        <div class="logo-wrap">
            <img id="main-logo" src="images/tallo-logo.png" alt="طلوا حبابنا - مادبا" loading="eager">
        </div>

        <!-- قسم أزرار التفاعل -->
        <div class="btn-col">
            <a href="javascript:void(0)" onclick="navigateTo('menu.html#arabic')" id="btn_arabic" class="main-btn gold">
                قائمة الطعام - عربي
            </a>
            <a href="javascript:void(0)" onclick="navigateTo('menu-en.html')" id="btn_english" class="main-btn gold">
                Tallo Menu - English
            </a>
            <a href="javascript:void(0)" onclick="navigateTo('feedback.html')" id="btn_feedback_ar" class="main-btn ghost">
                شاركنا تجربتك
            </a>
            <a href="javascript:void(0)" onclick="navigateTo('feedback-en.html')" id="btn_feedback_en" class="main-btn ghost">
                Share Your Experience
            </a>
        </div>

        <p style="margin-top: 35px; font-size: 0.85rem; color: rgba(255, 255, 255, 0.45);">طلوا حبابنا - مادبا، الأردن</p>
        
        <div class="social-bar" id="social-bar">
            <a href="https://maps.app.goo.gl/e8zRvaiQsCE6bMM4A" target="_blank" rel="noopener" class="s-link"><i class="fa-solid fa-location-dot"></i></a>
            <a href="https://wa.me/962779688633" target="_blank" rel="noopener" class="s-link"><i class="fa-brands fa-whatsapp"></i></a>
            <a href="https://www.instagram.com/tallo.hbabna/" target="_blank" rel="noopener" class="s-link"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://www.facebook.com/people/tallo-hbabna/61586065659210/" target="_blank" rel="noopener" class="s-link"><i class="fa-brands fa-facebook-f"></i></a>
        </div>
    </div>

    <!-- ملف الصوت المخفي -->
    <audio id="introAudio" preload="auto">
        <source src="intro-audio.m4a" type="audio/mp4">
    </audio>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        // Firebase Config
        const _fbCfg = {
            apiKey: "AIzaSyCwMxgmrfnsme4pgLx00tgjGCo-gQBMUo8",
            authDomain: "tallow-ahbabna.firebaseapp.com",
            projectId: "tallow-ahbabna",
            storageBucket: "tallow-ahbabna.firebasestorage.app",
            messagingSenderId: "1025966646494",
            appId: "1:1025966646494:web:f89373fad63d988f298e4f",
            databaseURL: "https://tallow-ahbabna-default-rtdb.firebaseio.com"
        };
        if (!firebase.apps.length) firebase.initializeApp(_fbCfg);
        const db = firebase.database();

        // Design Sync for Index
        db.ref('settings/design').on('value', s => {
            const d = s.val() || {};
            const r = document.documentElement.style;
            if (d.gold) r.setProperty('--gold', d.gold);
            if (d.bg) r.setProperty('--bg-dark', d.bg);
            if (d.font) {
                r.setProperty('--font-arabic', d.font);
                document.body.style.fontFamily = d.font;
            }
        });

        /**
         * بدء التجربة الكاملة (تشغيل الصوت وإظهار المحتوى)
         */
        function startExperience() {
            const splash = document.getElementById('splash-entry');
            const container = document.getElementById('main-container');
            const social = document.getElementById('social-bar');
            const audio = document.getElementById('introAudio');

            if (splash) splash.classList.add('fade-out');
            if (container) container.classList.add('reveal');
            if (social) social.classList.add('reveal');
            
            if (audio) {
                audio.play().catch(e => console.log("Audio play failed:", e));
            }
        }

        /**
         * 2. وظيفة الانتقال السريع والآمن
         */
        function navigateTo(url) {
            const video = document.getElementById('bgVideo');
            if (video) video.pause(); // إيقاف الفيديو فوراً لتوفير المعالج
            
            document.body.style.opacity = '0';
            // استخدام التنقل المباشر لسرعة الاستجابة
            setTimeout(() => { window.location.href = url; }, 50);
        }

        /**
         * 3. تشغيل الفيديو بكفاءة
         */
        function initVideo() {
            const video = document.getElementById('bgVideo');
            if (!video) return;
            video.play().catch(() => {
                window.addEventListener('pointerdown', () => video.play(), {once: true});
            });
        }
        window.addEventListener('load', initVideo);
    </script>
</body>

</html>
