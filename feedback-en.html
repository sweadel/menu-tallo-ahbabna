<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tallow Ahbabna | Share Your Experience</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-color: #000;
            color: #fff;
            padding-top: 20px;
            direction: ltr;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            font-weight: 600;
        }
        .feedback-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            background: rgba(26, 26, 26, 0.95);
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(197, 160, 34, 0.1);
            border: 1px solid rgba(197, 160, 34, 0.2);
        }
        .logo-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo-header img {
            height: 100px;
        }
        .intro-text {
            text-align: center;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 25px;
            color: #ccc;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            font-size: 0.85rem;
            margin-bottom: 5px;
            color: var(--primary);
            font-weight: 700;
        }
        .form-group input, .form-group textarea {
            background: #111;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--primary);
        }
        .rating-section {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            text-align: center;
            border: 1px solid #222;
        }
        .rating-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 10px;
            display: block;
        }
        .stars {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .stars i {
            font-size: 1.8rem;
            color: #333;
            cursor: pointer;
            transition: color 0.3s;
        }
        .stars i:hover, .stars i.active {
            color: var(--primary);
        }
        .submit-btn {
            width: 100%;
            background: var(--primary);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-weight: 800;
            font-size: 1.1rem;
            margin-top: 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .submit-btn:active {
            transform: scale(0.98);
        }
        @media (max-width: 480px) {
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="feedback-container">
            <div class="logo-header">
                <img src="images/tallo-logo.png" alt="Tallow Ahbabna">
            </div>
            
            <p class="intro-text">
                Thank you for choosing our restaurant. We always strive to provide the best service. Your feedback here will reach the management and quality department to ensure we always deliver the best.
            </p>

            <form id="feedbackForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" placeholder="Full Name">
                    </div>
                    <div class="form-group">
                        <label>Table or Invoice #</label>
                        <input type="text" placeholder="Leave blank if not available">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" placeholder="07XXXXXXXX">
                    </div>
                    <div class="form-group">
                        <label>Date & Time</label>
                        <input type="text" id="dateTime" readonly>
                    </div>
                </div>

                <div class="rating-section">
                    <span class="rating-title">Service</span>
                    <div class="stars" data-category="service">
                        <i class="fas fa-star" data-value="1"></i>
                        <i class="fas fa-star" data-value="2"></i>
                        <i class="fas fa-star" data-value="3"></i>
                        <i class="fas fa-star" data-value="4"></i>
                        <i class="fas fa-star" data-value="5"></i>
                    </div>
                </div>

                <div class="rating-section">
                    <span class="rating-title">Food Quality</span>
                    <div class="stars" data-category="food">
                        <i class="fas fa-star" data-value="1"></i>
                        <i class="fas fa-star" data-value="2"></i>
                        <i class="fas fa-star" data-value="3"></i>
                        <i class="fas fa-star" data-value="4"></i>
                        <i class="fas fa-star" data-value="5"></i>
                    </div>
                </div>

                <div class="rating-section">
                    <span class="rating-title">Atmosphere</span>
                    <div class="stars" data-category="atmosphere">
                        <i class="fas fa-star" data-value="1"></i>
                        <i class="fas fa-star" data-value="2"></i>
                        <i class="fas fa-star" data-value="3"></i>
                        <i class="fas fa-star" data-value="4"></i>
                        <i class="fas fa-star" data-value="5"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label>Do you have any additional comments?</label>
                    <textarea rows="4" placeholder="Write your notes here..."></textarea>
                </div>

                <button type="button" class="submit-btn" onclick="submitFeedback()">Send Feedback</button>
            </form>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        // Initialize Firebase
        const _cfg = {
            apiKey: "AIzaSyCwMxgmrfnsme4pgLx00tgjGCo-gQBMUo8",
            authDomain: "tallow-ahbabna.firebaseapp.com",
            projectId: "tallow-ahbabna",
            storageBucket: "tallow-ahbabna.firebasestorage.app",
            messagingSenderId: "1025966646494",
            appId: "1:1025966646494:web:f89373fad63d988f298e4f",
            databaseURL: "https://tallow-ahbabna-default-rtdb.firebaseio.com"
        };
        if (!firebase.apps.length) firebase.initializeApp(_cfg);
    </script>
    <script src="js/design-sync.js"></script>
    
    <script>
        // Set current date/time
        document.getElementById('dateTime').value = new Date().toLocaleString('en-US');

        // Star rating logic
        document.querySelectorAll('.stars i').forEach(star => {
            star.addEventListener('click', function() {
                const category = this.parentElement;
                const value = parseInt(this.getAttribute('data-value'));
                const stars = category.querySelectorAll('i');
                
                stars.forEach(s => {
                    if (parseInt(s.getAttribute('data-value')) <= value) {
                        s.classList.add('active');
                    } else {
                        s.classList.remove('active');
                    }
                });
            });
        });

        function submitFeedback() {
            const form = document.getElementById('feedbackForm');
            const name = form.querySelector('input[type="text"]').value;
            const table = form.querySelectorAll('input[type="text"]')[1].value;
            const phone = form.querySelector('input[type="tel"]').value;
            const comments = form.querySelector('textarea').value;
            
            const ratings = {};
            document.querySelectorAll('.stars').forEach(s => {
                const cat = s.getAttribute('data-category');
                const active = s.querySelectorAll('i.active').length;
                ratings[cat] = active;
            });

            if (!name) { alert('Please enter your name'); return; }

            const data = {
                name,
                table,
                phone,
                comments,
                ratings,
                timestamp: Date.now(),
                dateStr: document.getElementById('dateTime').value,
                lang: 'en'
            };

            const btn = document.querySelector('.submit-btn');
            btn.disabled = true;
            btn.textContent = 'Sending...';

            firebase.database().ref('feedback').push(data)
                .then(() => {
                    alert('Thank you for your feedback! Your notes have been sent successfully.');
                    window.location.href = 'index.html';
                })
                .catch(err => {
                    alert('An error occurred: ' + err.message);
                    btn.disabled = false;
                    btn.textContent = 'Send Feedback';
                });
        }
    </script>
</body>
</html>
