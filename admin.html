<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard – Tallo Ahbabna</title>
  <!-- SEO meta tags -->
  <meta name="description" content="Professional SaaS‑level admin panel for managing users, content and analytics of the Tallo Ahbabna platform." />
  <link rel="icon" href="data:," />
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Font Awesome for icons -->
  <script src="https://kit.fontawesome.com/yourkit.js" crossorigin="anonymous"></script>
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --font-family: 'Inter', sans-serif;
      --primary-h: 210; /* cool blue */
      --primary: hsl(var(--primary-h), 70%, 55%);
      --primary-dark: hsl(var(--primary-h), 70%, 45%);
      --bg: #f0f4f8;
      --bg-dark: #1e1e2f;
      --surface: #ffffff;
      --surface-dark: #2c2c3e;
      --text: #212529;
      --text-dark: #e0e0e0;
      --radius: 0.75rem;
      --shadow: 0 4px 12px rgba(0,0,0,0.08);
    }
    [data-theme="dark"] {
      --bg: var(--bg-dark);
      --surface: var(--surface-dark);
      --text: var(--text-dark);
    }
    * { box-sizing: border-box; }
    body {
      margin:0; font-family: var(--font-family); background: var(--bg); color: var(--text);
      display: flex; min-height: 100vh; overflow-x: hidden;
    }
    /* Sidebar */
    .sidebar {
      width: 260px; background: var(--surface); padding: 1.5rem; box-shadow: var(--shadow); border-right: 1px solid rgba(0,0,0,0.08);
      display: flex; flex-direction: column; gap: 1.5rem; transition: transform .3s ease;
    }
    .sidebar a { text-decoration:none; color: var(--text); font-weight:500; display:flex; align-items:center; gap:.5rem; padding:.5rem 1rem; border-radius: var(--radius); transition: background .2s; }
    .sidebar a:hover, .sidebar a.active { background: rgba(0,0,0,0.05); }
    .sidebar .logo { font-size:1.25rem; font-weight:700; color: var(--primary); }
    /* Main content */
    .main {
      flex:1; padding:1.5rem; max-width: 1440px; margin:auto;
    }
    .topbar {
      display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;
    }
    .topbar h1 { margin:0; font-size:1.5rem; font-weight:600; }
    .toggle-theme {
      cursor:pointer; font-size:1.2rem; color: var(--text);
    }
    /* Cards */
    .grid {
      display:grid; grid-template-columns: repeat(auto-fit, minmax(250px,1fr)); gap:1.5rem;
    }
    .card {
      background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding:1.5rem; transition: transform .2s;
    }
    .card:hover { transform: translateY(-4px); }
    .card h3 { margin:0 0 .5rem; font-size:1rem; color: #555; }
    .card .value { font-size:1.75rem; font-weight:600; color: var(--primary); }
    /* Table */
    table { width:100%; border-collapse:collapse; background: var(--surface); border-radius: var(--radius); overflow:hidden; box-shadow: var(--shadow); }
    th, td { padding:.75rem 1rem; text-align:left; }
    th { background: rgba(0,0,0,0.04); font-weight:600; }
    tr:nth-child(even) { background: rgba(0,0,0,0.02); }
    .badge { padding:.2rem .6rem; border-radius:12px; font-size:.75rem; font-weight:500; }
    .badge.admin { background: hsl(0,70%,80%); color:#900; }
    .badge.editor { background: hsl(45,70%,80%); color:#b75c00; }
    .badge.user { background: hsl(120,70%,80%); color:#006400; }
    /* Responsive */
    @media(max-width:768px){ .sidebar{ position:fixed; top:0; left:0; height:100vh; transform:translateX(-100%); z-index:1000; }
      .sidebar.open{transform:translateX(0);} .menu-btn{display:block;cursor:pointer;}
    }
  </style>
</head>
<body data-theme="light">
  <aside class="sidebar" id="sidebar">
    <div class="logo">Tallo Ahbabna</div>
    <nav>
      <a href="#" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="#users"><i class="fas fa-users"></i> Users</a>
      <a href="#menu"><i class="fas fa-utensils"></i> Menu</a>
      <a href="#content"><i class="fas fa-database"></i> Content</a>
      <a href="#settings"><i class="fas fa-cog"></i> Settings</a>
      <a href="#logs"><i class="fas fa-clipboard-list"></i> Logs</a>
    </nav>
  </aside>
  <main class="main">
    <div class="topbar">
      <h1>Admin Dashboard</h1>
      <div class="toggle-theme" id="themeToggle"><i class="fas fa-moon"></i></div>
    </div>
    <section class="grid">
      <div class="card">
        <h3>Total Users</h3>
        <div class="value" id="totalUsers">—</div>
      </div>
      <div class="card">
        <h3>Active Sessions</h3>
        <div class="value" id="activeSessions">—</div>
      </div>
      <div class="card">
        <h3>New Sign‑ups (24h)</h3>
        <div class="value" id="newSignups">—</div>
      </div>
      <div class="card">
        <h3>System Errors</h3>
        <div class="value" id="systemErrors">—</div>
      </div>
    </section>
    <section style="margin-top:2rem;">
      <h2>Users Management</h2>
      <table id="usersTable">
        <thead>
          <tr><th>Name</th><th>Email</th><th>Role</th><th>Actions</th></tr>
        </thead>
        <tbody>
          <!-- rows will be injected by JS -->
        </tbody>
      </table>
    </section>
    <section id="menuSection" style="display:none; margin-top:2rem;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
        <h2>Menu Management</h2>
        <button id="addMenuItemBtn" class="main-btn gold" style="padding: 0.5rem 1rem; font-size: 0.9rem; border-radius: 0.5rem;">+ Add Item</button>
      </div>
      <table id="menuTable">
        <thead>
          <tr><th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Actions</th></tr>
        </thead>
        <tbody>
          <!-- rows will be injected by JS -->
        </tbody>
      </table>
    </section>

    <section id="analyticsSection" style="margin-top:2rem;">
      <h2>Analytics</h2>
      <canvas id="signupsChart" width="400" height="200"></canvas>
    </section>

    <!-- Modal for Menu Items -->
    <div id="itemModal" class="modal-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:2000; align-items:center; justify-content:center;">
      <div class="card" style="width:100%; max-width:500px; position:relative;">
        <button id="closeModalBtn" style="position:absolute; top:1rem; right:1rem; border:none; background:none; font-size:1.5rem; cursor:pointer; color:var(--text);">&times;</button>
        <h2 id="modalTitle">Add Menu Item</h2>
        <form id="menuItemForm" style="display:flex; flex-direction:column; gap:1rem; margin-top:1rem;">
          <input type="text" id="itemName" placeholder="Item Name (Arabic)" required style="padding:0.5rem; border-radius:0.4rem; border:1px solid #ccc;" />
          <input type="text" id="itemNameEn" placeholder="Item Name (English)" style="padding:0.5rem; border-radius:0.4rem; border:1px solid #ccc;" />
          <select id="itemCategory" required style="padding:0.5rem; border-radius:0.4rem; border:1px solid #ccc;">
            <option value="" disabled selected>Select Category</option>
            <option value="dr-cold">Cold Drinks</option>
            <option value="dr-hot">Hot Drinks</option>
            <option value="dr-juice">Juices & Smoothies</option>
            <option value="dr-mojito">Mojito & Iced Tea</option>
          </select>
          <input type="text" id="itemPrice" placeholder="Price (JD)" style="padding:0.5rem; border-radius:0.4rem; border:1px solid #ccc;" />
          <input type="text" id="itemImage" placeholder="Image Path (e.g. images/pepsi.png)" style="padding:0.5rem; border-radius:0.4rem; border:1px solid #ccc;" />
          <textarea id="itemDesc" placeholder="Description (Arabic)" style="padding:0.5rem; border-radius:0.4rem; border:1px solid #ccc;"></textarea>
          <button type="submit" class="main-btn gold" style="padding:0.75rem; border-radius:0.5rem;">Save Item</button>
        </form>
      </div>
    </div>
  </main>
  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { renderUsers, setupUserActions } from "./assets/js/users.js";
import { initChart } from "./assets/js/analytics.js";
import { renderMenu, setupMenuActions } from "./assets/js/menu.js";
import { auth, db } from "./assets/js/firebase.js";

// Theme toggle (kept inline for simplicity)
const toggle = document.getElementById('themeToggle');
const root = document.body;
toggle.addEventListener('click',()=>{
  const isDark = root.dataset.theme==='dark';
  root.dataset.theme = isDark?'light':'dark';
  toggle.innerHTML = isDark?'<i class="fas fa-moon"></i>':'<i class="fas fa-sun"></i>';
});

// Auth state listener (placeholder – customize as needed)
onAuthStateChanged(auth, user => {
  if (user) {
    console.log('Logged in as', user.email);
    // TODO: fetch role from Firestore and adjust UI permissions
  } else {
    console.log('Not logged in');
  }
});
// Initialize dashboard data
renderUsers();
setupUserActions();
initChart();
renderMenu();
setupMenuActions();

// Navigation logic
document.querySelectorAll('.sidebar nav a').forEach(link => {
  link.addEventListener('click', (e) => {
    e.preventDefault();
    document.querySelectorAll('.sidebar nav a').forEach(l => l.classList.remove('active'));
    link.classList.add('active');
    
    const target = link.getAttribute('href').substring(1);
    document.querySelectorAll('section').forEach(s => s.style.display = 'none');
    
    if (target === 'users') {
      document.getElementById('usersSection').style.display = 'block';
    } else if (target === 'menu') {
      document.getElementById('menuSection').style.display = 'block';
    } else if (target === 'analytics') {
      document.getElementById('analyticsSection').style.display = 'block';
    } else {
      // Default dashboard view
      document.getElementById('statsSection').style.display = 'grid';
      document.getElementById('usersSection').style.display = 'block';
      document.getElementById('analyticsSection').style.display = 'block';
    }
  });
});

</script>
</body>
</html>
