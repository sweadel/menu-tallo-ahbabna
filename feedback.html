<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلو أحبابنا | خبرنا عن تجربتك</title>
    <!-- استيراد الخطوط والأيقونات والتنسيقات الأساسية -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        body {
            background-color: #000;
            color: #fff;
            padding-top: 20px;
            direction: rtl; /* الكتابة من اليمين لليسار */
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            font-weight: 600;
        }

        /* حاوية نموذج التقييم بتصميم ذهبي وأنيق */
        .feedback-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            background: rgba(26, 26, 26, 0.95);
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(197, 160, 34, 0.1);
            border: 1px solid rgba(197, 160, 34, 0.2);
        }

        .logo-header { text-align: center; margin-bottom: 20px; }
        .logo-header img { height: 100px; }

        .intro-text {
            text-align: center;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 25px;
            color: #ccc;
        }

        /* تقسيم النموذج لشبكة (خانتين بجانب بعض) */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group { display: flex; flex-direction: column; }
        .form-group label {
            font-size: 0.85rem;
            margin-bottom: 5px;
            color: var(--primary);
            font-weight: 700;
        }

        .form-group input, .form-group textarea {
            background: #111;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.9rem;
            outline: none;
            transition: 0.3s;
        }

        /* تنسيق أقسام النجوم */
        .rating-section {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            text-align: center;
            border: 1px solid #222;
        }

        .rating-title { font-size: 1rem; font-weight: 700; margin-bottom: 10px; display: block; }
        
        /* جعل النجوم تعمل بشكل تفاعلي */
        .stars {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-direction: row-reverse; /* لعكس اتجاه التظليل */
        }
        .stars i { font-size: 1.8rem; color: #333; cursor: pointer; transition: 0.3s; }
        .stars i:hover, .stars i.active { color: var(--primary); }

        .submit-btn {
            width: 100%;
            background: var(--primary);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-weight: 800;
            font-size: 1.1rem;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.2s;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="feedback-container">
            <div class="logo-header">
                <img src="images/tallo-logo.png" alt="Tallow Ahbabna">
            </div>
            
            <p class="intro-text">
                نشكر ونقدر لكم اختياركم لمطاعمنا، ونعمل على الدوام على توفير أفضل الخدمات لكم. رأيكم هنا سيصل للإدارة وقسم الجودة لضمان تقديم الأفضل دائماً.
            </p>

            <form id="feedbackForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>الإسم</label>
                        <input type="text" placeholder="الإسم الكامل">
                    </div>
                    <div class="form-group">
                        <label>رقم الطاولة أو الفاتورة</label>
                        <input type="text" placeholder="رقم الطاولة">
                    </div>
                    <div class="form-group">
                        <label>رقم الهاتف</label>
                        <input type="tel" placeholder="07XXXXXXXX">
                    </div>
                    <div class="form-group">
                        <label>الوقت والتاريخ</label>
                        <input type="text" id="dateTime" readonly>
                    </div>
                </div>

                <!-- أقسام التقييم بالنجوم -->
                <div class="rating-section">
                    <span class="rating-title">الخدمة</span>
                    <div class="stars" data-category="service">
                        <i class="fas fa-star" data-value="5"></i>
                        <i class="fas fa-star" data-value="4"></i>
                        <i class="fas fa-star" data-value="3"></i>
                        <i class="fas fa-star" data-value="2"></i>
                        <i class="fas fa-star" data-value="1"></i>
                    </div>
                </div>

                <div class="rating-section">
                    <span class="rating-title">الطعام</span>
                    <div class="stars" data-category="food">
                        <i class="fas fa-star" data-value="5"></i>
                        <i class="fas fa-star" data-value="4"></i>
                        <i class="fas fa-star" data-value="3"></i>
                        <i class="fas fa-star" data-value="2"></i>
                        <i class="fas fa-star" data-value="1"></i>
                    </div>
                </div>

                <div class="rating-section">
                    <span class="rating-title">الأجواء</span>
                    <div class="stars" data-category="atmosphere">
                        <i class="fas fa-star" data-value="5"></i>
                        <i class="fas fa-star" data-value="4"></i>
                        <i class="fas fa-star" data-value="3"></i>
                        <i class="fas fa-star" data-value="2"></i>
                        <i class="fas fa-star" data-value="1"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label>هل لديك أي كلمات إضافية؟</label>
                    <textarea rows="4" placeholder="اكتب ملاحظاتك هنا..."></textarea>
                </div>

                <button type="button" class="submit-btn" onclick="submitFeedback()">إرسال التقييم</button>
            </form>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        // إعدادات الاتصال بـ Firebase
        const _cfg = {
            apiKey: "AIzaSyCwMxgmrfnsme4pgLx00tgjGCo-gQBMUo8",
            authDomain: "tallow-ahbabna.firebaseapp.com",
            projectId: "tallow-ahbabna",
            storageBucket: "tallow-ahbabna.firebasestorage.app",
            messagingSenderId: "1025966646494",
            appId: "1:1025966646494:web:f89373fad63d988f298e4f",
            databaseURL: "https://tallow-ahbabna-default-rtdb.firebaseio.com"
        };
        if (!firebase.apps.length) firebase.initializeApp(_cfg);
    </script>
    <!-- ملف مزامنة التصميم: ليأخذ صفحة التقييم نفس ألوان المنيو تلقائياً -->
    <script src="js/design-sync.js"></script>
    
    <script>
        // تحديد الوقت الحالي تلقائياً
        document.getElementById('dateTime').value = new Date().toLocaleString('ar-EG');

        // منطق النجوم: تلوين النجوم عند النقر عليها
        document.querySelectorAll('.stars i').forEach(star => {
            star.addEventListener('click', function() {
                const category = this.parentElement;
                const value = parseInt(this.getAttribute('data-value'));
                const stars = category.querySelectorAll('i');
                
                stars.forEach(s => {
                    if (parseInt(s.getAttribute('data-value')) <= value) {
                        s.classList.add('active'); // تلوين النجمة
                    } else {
                        s.classList.remove('active'); // إطفاء النجمة
                    }
                });
            });
        });

        // وظيفة إرسال التقييم لقاعدة البيانات
        function submitFeedback() {
            const form = document.getElementById('feedbackForm');
            const name = form.querySelector('input[type="text"]').value;
            const table = form.querySelectorAll('input[type="text"]')[1].value;
            const phone = form.querySelector('input[type="tel"]').value;
            const comments = form.querySelector('textarea').value;
            
            // جمع التقييمات (عدد النجوم) لكل قسم
            const ratings = {};
            document.querySelectorAll('.stars').forEach(s => {
                const cat = s.getAttribute('data-category');
                const active = s.querySelectorAll('i.active').length;
                ratings[cat] = active;
            });

            if (!name) { alert('يرجى إدخال الاسم'); return; }

            const data = {
                name,
                table,
                phone,
                comments,
                ratings,
                timestamp: Date.now(),
                dateStr: document.getElementById('dateTime').value
            };

            const btn = document.querySelector('.submit-btn');
            btn.disabled = true;
            btn.textContent = 'جاري الإرسال...';

            // دفع البيانات لجدول feedback في Firebase
            firebase.database().ref('feedback').push(data)
                .then(() => {
                    alert('شكراً لتقييمك! تم إرسال ملاحظاتك بنجاح.');
                    window.location.href = 'index.html'; // العودة للرئيسية
                })
                .catch(err => {
                    alert('حدث خطأ: ' + err.message);
                    btn.disabled = false;
                    btn.textContent = 'إرسال التقييم';
                });
        }
    </script>
</body>
</html>
</body>
</html>
